services:
  - type: web
    name: ecopick-backend
    runtime: node
    rootDir: .
    buildCommand: cd backend && npm install && npm run build
    startCommand: node backend/dist/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MONGODB_URI
        sync: false
